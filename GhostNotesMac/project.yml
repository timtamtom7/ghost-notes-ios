name: GhostNotesMac
options:
  bundleIdPrefix: com.ghostnotes
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  GhostNotesMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
      - path: ../GhostNotes/Models
        group: GhostNotes/Models
        excludes:
          - "**/.DS_Store"
      - path: ../GhostNotes/Services
        group: GhostNotes/Services
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ghostnotes.macos
        INFOPLIST_KEY_CFBundleDisplayName: "Ghost Notes"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSMainNibFile: ""
        INFOPLIST_KEY_LSUIElement: NO
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: AppKit.framework
