name: GhostNotes
options:
  bundleIdPrefix: com.tomalabs
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  GhostNotes:
    type: application
    platform: iOS
    sources:
      - path: GhostNotes
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomalabs.ghostnotes
        INFOPLIST_KEY_CFBundleDisplayName: "Ghost Notes"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES

  GhostNotesShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: GhostNotesShareExtension
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomalabs.ghostnotes.share
        INFOPLIST_FILE: GhostNotesShareExtension/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        SKIP_INSTALL: YES

  GhostNotesMac:
    type: application
    platform: macOS
    sources:
      - path: GhostNotesMac
        type: group
      - path: GhostNotes/Models
        type: group
      - path: GhostNotes/Services/DatabaseService.swift
        type: file
      - path: GhostNotes/Services/ArticleService.swift
        type: file
      - path: GhostNotes/Services/GhostNotesR11Service.swift
        type: file
      - path: GhostNotes/Services/GhostNotesR12Service.swift
        type: file
      - path: GhostNotes/Services/RecommendationService.swift
        type: file
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomalabs.ghostnotesmac
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSMainNibFile: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
